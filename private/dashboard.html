<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes réponses · AppAM</title>
  <style>
    :root {
      --violet: #7c3aed; --pink: #ec4899; --ink: #1f2937; --muted: #6b7280;
      --line: #e9e7f0; --bg: #f6f5fb; --card: #fff; --ok: #16a34a; --soft: #faf9ff;
      --radius: 16px; --shadow: 0 4px 18px rgba(17,24,39,.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg); color: var(--ink); line-height: 1.55;
    }
    .topbar {
      background: linear-gradient(90deg, var(--violet), var(--pink));
      color: #fff; padding: 16px 18px; position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
    }
    .topbar h1 { font-size: 18px; }
    .topbar .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      background: rgba(255,255,255,.18); color: #fff; border: 1px solid rgba(255,255,255,.45);
      padding: 9px 14px; border-radius: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:hover { background: rgba(255,255,255,.3); }
    .wrap { max-width: 860px; margin: 0 auto; padding: 18px 14px 70px; }

    .kpis { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
    .kpi {
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 14px; text-align: center;
    }
    .kpi .n { font-size: 26px; font-weight: 800; color: var(--violet); line-height: 1.1; }
    .kpi .l { font-size: 12px; color: var(--muted); margin-top: 4px; }
    @media (max-width: 560px) { .kpis { grid-template-columns: repeat(2,1fr); } .kpi .n { font-size: 22px; } }

    /* Objectif */
    .goal {
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 16px 18px; margin-top: 12px;
    }
    .goal-top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; margin-bottom: 8px; }
    .goal-title { font-weight: 800; font-size: 15px; }
    .goal-count { font-size: 14px; color: var(--muted); font-weight: 700; }
    .goal-count b { color: var(--violet); font-size: 18px; }
    .goal-track { height: 16px; background: #f0eefb; border-radius: 999px; overflow: hidden; }
    .goal-fill { height: 100%; background: linear-gradient(90deg, var(--violet), var(--pink)); border-radius: 999px; transition: width .5s; min-width: 2px; }
    .goal-left { font-size: 12.5px; color: var(--muted); margin-top: 8px; }
    .goal-done { color: var(--ok); font-weight: 700; }

    .tabs { display: flex; gap: 8px; margin: 20px 0 14px; }
    .tab {
      flex: 1; text-align: center; padding: 12px; border-radius: 12px; cursor: pointer;
      background: #efeafd; color: var(--violet); font-weight: 700; font-size: 15px;
      border: 1.5px solid transparent; user-select: none;
    }
    .tab.active { background: var(--violet); color: #fff; }

    .search {
      width: 100%; border: 1.5px solid var(--line); border-radius: 12px;
      padding: 12px 14px; font-size: 15px; margin-bottom: 14px; background: #fff;
    }
    .search:focus { outline: none; border-color: var(--violet); }

    .resp {
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 16px 18px; margin-bottom: 14px;
    }
    .resp-head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; margin-bottom: 6px; flex-wrap: wrap;
    }
    .resp-name { font-size: 17px; font-weight: 800; }
    .resp-date { font-size: 12px; color: var(--muted); }
    .resp-head-right { display: flex; align-items: center; gap: 10px; }
    .del-btn {
      background: #fef2f2; color: #dc2626; border: 1px solid #fecaca;
      border-radius: 8px; padding: 5px 10px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .del-btn:hover { background: #fee2e2; }
    .resp-activity {
      display: inline-block; background: #fdeef6; color: var(--pink);
      font-weight: 700; font-size: 13px; padding: 3px 10px; border-radius: 999px; margin-bottom: 10px;
    }
    .qa { padding: 9px 0; border-top: 1px dashed var(--line); }
    .qa:first-of-type { border-top: none; }
    .qa .q { font-size: 12.5px; color: var(--muted); font-weight: 600; }
    .qa .a { font-size: 15px; margin-top: 2px; }
    .qa .a.big { background: #fff7ed; border-left: 3px solid #f59e0b; padding: 8px 10px; border-radius: 8px; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .tag { background: #f1eefe; color: var(--violet); font-size: 13px; padding: 3px 9px; border-radius: 8px; font-weight: 600; }
    .wa-btn {
      display: inline-flex; align-items: center; gap: 6px; margin-top: 12px;
      background: #25d366; color: #fff; text-decoration: none; font-weight: 700;
      padding: 8px 14px; border-radius: 10px; font-size: 14px;
    }

    .panel {
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 18px; margin-bottom: 14px;
    }
    .panel h3 { font-size: 15px; margin-bottom: 14px; }
    .bar-row { margin-bottom: 12px; }
    .bar-top { display: flex; justify-content: space-between; font-size: 13.5px; margin-bottom: 4px; gap: 10px; }
    .bar-top .lbl { color: var(--ink); }
    .bar-top .val { color: var(--muted); font-weight: 600; white-space: nowrap; }
    .bar-track { height: 12px; background: #f0eefb; border-radius: 999px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, var(--violet), var(--pink)); border-radius: 999px; transition: width .4s; }

    .verb { background: var(--soft); border-left: 3px solid var(--violet); border-radius: 8px; padding: 10px 12px; font-size: 14px; margin-bottom: 8px; }
    .verb .who { color: var(--muted); font-size: 11px; margin-top: 6px; }

    .empty { color: var(--muted); font-size: 15px; text-align: center; padding: 50px 20px; }
    .loading { text-align: center; padding: 60px; color: var(--muted); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>💜 Mes réponses</h1>
    <div class="actions">
      <button class="btn" onclick="location.reload()">🔄 Actualiser</button>
      <a class="btn" href="/api/export.csv">⬇️ Excel</a>
    </div>
  </div>

  <div class="wrap">
    <div id="content" class="loading">Chargement…</div>
  </div>

  <script>
  (function () {
    'use strict';
    let SCHEMA = null, RESPONSES = [], byId = {};
    const GOAL = 100;

    Promise.all([
      fetch('/api/questions').then(r => r.json()),
      fetch('/api/responses').then(r => r.json())
    ]).then(([schema, responses]) => {
      SCHEMA = schema;
      RESPONSES = responses.slice().reverse();
      schema.questions.forEach(q => byId[q.id] = q);
      render();
    }).catch(() => {
      document.getElementById('content').innerHTML =
        '<div class="empty">Erreur de chargement. Recharge la page.</div>';
    });

    function render() {
      const root = document.getElementById('content');
      root.classList.remove('loading');

      if (!RESPONSES.length) {
        root.innerHTML =
          '<div class="panel"><div class="empty">Aucune réponse pour le moment 🙏<br>' +
          'Partage ton lien et reviens ici, chaque réponse apparaîtra automatiquement.</div></div>';
        return;
      }

      root.innerHTML =
        kpis() +
        goalBanner() +
        '<div class="tabs">' +
          '<div class="tab active" data-tab="list">📋 Réponses (' + RESPONSES.length + ')</div>' +
          '<div class="tab" data-tab="summary">📊 Résumé</div>' +
        '</div>' +
        '<input class="search" id="search" placeholder="🔍 Rechercher un nom, une activité, un mot…" />' +
        '<div id="listView"></div>' +
        '<div id="summaryView" class="hidden"></div>';

      buildList(RESPONSES);
      buildSummary();

      root.querySelectorAll('.tab').forEach(t => {
        t.onclick = () => {
          root.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
          t.classList.add('active');
          const isList = t.dataset.tab === 'list';
          document.getElementById('listView').classList.toggle('hidden', !isList);
          document.getElementById('summaryView').classList.toggle('hidden', isList);
          document.getElementById('search').classList.toggle('hidden', !isList);
        };
      });

      document.getElementById('search').addEventListener('input', e => {
        const q = e.target.value.toLowerCase().trim();
        const filtered = !q ? RESPONSES : RESPONSES.filter(r =>
          JSON.stringify(r.answers).toLowerCase().includes(q)
        );
        buildList(filtered);
      });
    }

    function kpis() {
      const total = RESPONSES.length;
      const beta = RESPONSES.filter(r => (r.answers.q22 || '').indexOf('Oui') === 0).length;
      const pay = RESPONSES.filter(r => r.answers.q21 && r.answers.q21.indexOf('Rien') !== 0).length;
      const prepay = RESPONSES.filter(r => (r.answers.q23 || '').indexOf('Oui') === 0).length;
      const card = (n, l) => '<div class="kpi"><div class="n">' + n + '</div><div class="l">' + l + '</div></div>';
      return '<div class="kpis">' +
        card(total, 'Réponses') +
        card(beta, 'Beta-testeuses') +
        card(pay, 'Prêtes à payer') +
        card(prepay, 'Pré-paiement 🔥') +
        '</div>';
    }

    function goalBanner() {
      const total = RESPONSES.length;
      const pct = Math.min(100, Math.round(total / GOAL * 100));
      const reached = total >= GOAL;
      const left = Math.max(0, GOAL - total);
      return '<div class="goal">' +
        '<div class="goal-top">' +
          '<span class="goal-title">🎯 Objectif : ' + GOAL + ' retours</span>' +
          '<span class="goal-count"><b>' + total + '</b> / ' + GOAL + '</span>' +
        '</div>' +
        '<div class="goal-track"><div class="goal-fill" style="width:' + pct + '%"></div></div>' +
        '<div class="goal-left">' +
          (reached
            ? '<span class="goal-done">🎉 Objectif atteint ! Bravo à toi 💜</span>'
            : 'Encore <b>' + left + '</b> réponse' + (left > 1 ? 's' : '') + ' pour atteindre ton objectif — ' + pct + '% fait') +
        '</div>' +
      '</div>';
    }

    function buildList(list) {
      const view = document.getElementById('listView');
      if (!list.length) { view.innerHTML = '<div class="empty">Aucun résultat pour cette recherche.</div>'; return; }

      view.innerHTML = list.map(r => {
        const a = r.answers;
        const name = a.q1 || 'Anonyme';
        const activity = a.q2 || '';
        const date = new Date(r.createdAt).toLocaleString('fr-FR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });

        let html = '<div class="resp"><div class="resp-head">' +
          '<span class="resp-name">' + esc(name) + '</span>' +
          '<span class="resp-head-right">' +
            '<span class="resp-date">' + date + '</span>' +
            '<button class="del-btn" data-del="' + esc(r.id) + '" data-name="' + esc(name) + '">🗑️</button>' +
          '</span>' +
        '</div>';
        if (activity) html += '<span class="resp-activity">' + esc(activity) + '</span>';

        ['q14','q16'].forEach(qid => {
          if (a[qid]) html += qa(byId[qid].label, a[qid], true);
        });

        SCHEMA.questions.forEach(q => {
          if (['q1','q2','q14','q16','q22b'].includes(q.id)) return;
          if (a[q.id] === undefined) return;
          html += qa(q.label, a[q.id], false, a[q.id + '_other']);
        });

        if (a.q22b) {
          const num = String(a.q22b).replace(/[^0-9]/g, '');
          html += '<a class="wa-btn" href="https://wa.me/' + num + '" target="_blank">💬 Écrire sur WhatsApp (' + esc(a.q22b) + ')</a>';
        }

        html += '</div>';
        return html;
      }).join('');

      view.querySelectorAll('.del-btn').forEach(b => {
        b.onclick = () => deleteResponse(b.dataset.del, b.dataset.name);
      });
    }

    function deleteResponse(id, name) {
      if (!confirm('Supprimer la réponse de ' + (name || 'cette personne') + ' ?\nCette action est définitive.')) return;
      fetch('/api/responses/' + encodeURIComponent(id), { method: 'DELETE' })
        .then(r => r.json().then(d => ({ ok: r.ok, d })))
        .then(({ ok, d }) => {
          if (!ok) throw new Error(d.error || 'Erreur');
          RESPONSES = RESPONSES.filter(x => x.id !== id);
          render();
        })
        .catch(err => alert('Suppression impossible : ' + err.message));
    }

    function qa(label, value, big, other) {
      let inner;
      if (Array.isArray(value)) {
        inner = '<div class="tags">' + value.map(v => '<span class="tag">' + esc(v) + '</span>').join('') + '</div>';
      } else {
        inner = '<div class="a' + (big ? ' big' : '') + '">' + esc(value) + '</div>';
      }
      if (other) inner += '<div class="a" style="color:var(--muted);font-size:13px">Autre : ' + esc(other) + '</div>';
      return '<div class="qa"><div class="q">' + esc(label) + '</div>' + inner + '</div>';
    }

    function buildSummary() {
      const view = document.getElementById('summaryView');
      let html = '';

      SCHEMA.questions.filter(q => q.type === 'textarea').forEach(q => {
        const items = RESPONSES.filter(r => r.answers[q.id]);
        html += '<div class="panel"><h3>' + esc(q.label) + ' (' + items.length + ')</h3>';
        if (!items.length) html += '<div class="empty" style="padding:20px">Aucune réponse écrite.</div>';
        else items.forEach(r => {
          html += '<div class="verb">' + esc(r.answers[q.id]) +
            '<div class="who">' + (r.answers.q1 ? esc(r.answers.q1) + ' · ' : '') +
            new Date(r.createdAt).toLocaleDateString('fr-FR') + '</div></div>';
        });
        html += '</div>';
      });

      SCHEMA.questions.filter(q => q.type === 'single' || q.type === 'multi').forEach(q => {
        const counts = {};
        q.options.forEach(o => counts[o] = 0);
        RESPONSES.forEach(r => {
          const v = r.answers[q.id];
          if (!v) return;
          (Array.isArray(v) ? v : [v]).forEach(val => { counts[val] = (counts[val] || 0) + 1; });
        });
        const max = Math.max(1, ...Object.values(counts));
        let rows = '';
        Object.keys(counts).forEach(opt => {
          const c = counts[opt];
          if (c === 0) return;
          const pct = Math.round(c / RESPONSES.length * 100);
          rows += '<div class="bar-row"><div class="bar-top"><span class="lbl">' + esc(opt) +
            '</span><span class="val">' + c + ' · ' + pct + '%</span></div>' +
            '<div class="bar-track"><div class="bar-fill" style="width:' + (c / max * 100) + '%"></div></div></div>';
        });
        if (rows) html += '<div class="panel"><h3>' + esc(q.label) + '</h3>' + rows + '</div>';
      });

      view.innerHTML = html;
    }

    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }
  })();
  </script>
</body>
</html>
